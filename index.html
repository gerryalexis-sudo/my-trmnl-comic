<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TRMNL Comic Display</title>
    <style>
        /* Force a clean, high-contrast look for e-ink */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .comic-container {
            max-width: 100%;
            max-height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        img {
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
            /* Optional: heavy contrast boost to make text readable on e-ink */
            filter: grayscale(100%) contrast(120%); 
        }
    </style>
</head>
<body>

    <div class="comic-container">
        <img src="https://www.gocomics.com/chuckdrawsthings.png" alt="Today's Comic">
    </div>

</body>
</html>
